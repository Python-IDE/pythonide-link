<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-itunes-app" content="app-id=6753987304">
    <meta name="theme-color" content="#0f172a">
    <title>Python IDE 分享</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #667085;
        --line: rgba(15, 23, 42, 0.11);
        --accent: #2364d2;
        --accent-strong: #164aa3;
        --warn: #a15c05;
        --warn-bg: #fff7e6;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1020;
          --panel: #141a2a;
          --text: #f8fafc;
          --muted: #a5b4c8;
          --line: rgba(226, 232, 240, 0.16);
          --accent: #7aa7ff;
          --accent-strong: #9dbdff;
          --warn: #ffd28a;
          --warn-bg: rgba(161, 92, 5, 0.18);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(760px, 100%);
        margin: 0 auto;
        padding: max(24px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
      }

      .shell {
        min-height: calc(100vh - 52px);
        display: grid;
        align-content: center;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .logo {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        color: white;
        background: linear-gradient(135deg, #2364d2, #29a36a);
        font-weight: 800;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 22px 55px rgba(15, 23, 42, 0.10);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 7vw, 42px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        line-height: 1.65;
      }

      .summary {
        color: var(--muted);
        font-size: 16px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }

      a.button,
      button.button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .primary {
        background: var(--accent);
        color: white;
      }

      .primary:active {
        background: var(--accent-strong);
      }

      .secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--line) !important;
      }

      .notice {
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 12px;
        background: var(--warn-bg);
        color: var(--warn);
        font-size: 14px;
      }

      .code {
        overflow-wrap: anywhere;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        color: var(--muted);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <div class="brand">
          <div class="logo">Py</div>
          <div>
            <strong>Python IDE</strong>
            <div>社区作品与远程导入</div>
          </div>
        </div>

        <section class="card" id="card">
          <h1 id="title">正在打开...</h1>
          <p class="summary" id="summary">如果已经安装 Python IDE，会自动尝试打开 App。</p>

          <div class="meta" id="meta"></div>

          <div class="actions">
            <button class="button primary" id="openApp">用 App 打开</button>
            <a class="button secondary" href="https://apps.apple.com/app/id6753987304" id="downloadApp">下载 App</a>
          </div>

          <p class="notice hidden" id="notice"></p>
          <p class="code hidden" id="raw"></p>
        </section>
      </div>
    </main>

    <script>
      const API_BASE = 'https://community-api-axuaystczl.cn-hangzhou.fcapp.run';
      const APP_STORE_URL = 'https://apps.apple.com/app/id6753987304';

      const state = {
        path: new URLSearchParams(location.search).get('path') || location.pathname + location.search,
      };

      const el = {
        title: document.getElementById('title'),
        summary: document.getElementById('summary'),
        meta: document.getElementById('meta'),
        openApp: document.getElementById('openApp'),
        downloadApp: document.getElementById('downloadApp'),
        notice: document.getElementById('notice'),
        raw: document.getElementById('raw'),
      };

      function setMeta(items) {
        el.meta.replaceChildren(...items.filter(Boolean).map((text) => {
          const span = document.createElement('span');
          span.className = 'pill';
          span.textContent = text;
          return span;
        }));
      }

      function showNotice(text) {
        el.notice.textContent = text;
        el.notice.classList.remove('hidden');
      }

      function parseRoute() {
        const url = new URL(state.path, location.origin);
        const parts = url.pathname.split('/').filter(Boolean);
        if (parts[0] === 's' && parts[1]) {
          return { type: 'script', id: decodeURIComponent(parts[1]) };
        }
        if (parts[0] === 'l' && parts[1]) {
          return { type: 'short', code: decodeURIComponent(parts[1]) };
        }
        if (parts[0] === 'import') {
          const remote = url.searchParams.get('url') || url.searchParams.get('u') || '';
          return { type: 'import', remote };
        }
        return { type: 'home' };
      }

      function customURLFor(route) {
        if (route.type === 'script') {
          return `pythonide://community/script?id=${encodeURIComponent(route.id)}`;
        }
        if (route.type === 'import' && route.remote) {
          return `pythonide://import?url=${encodeURIComponent(route.remote)}`;
        }
        return 'pythonide://';
      }

      function isMiniAppPackage(value) {
        const lower = value.toLowerCase();
        return lower.endsWith('.miniapp') ||
          lower.endsWith('.miniappcollection') ||
          lower.endsWith('.miniapp.zip') ||
          lower.endsWith('.miniappcollection.zip') ||
          lower.endsWith('.minip') ||
          lower.endsWith('.minip.zip') ||
          (lower.endsWith('.zip') && lower.includes('miniapp'));
      }

      function openApp(url) {
        location.href = url;
      }

      function hostnameFor(value) {
        try {
          return new URL(value).hostname;
        } catch {
          return '';
        }
      }

      async function loadScript(route) {
        const appURL = customURLFor(route);
        el.openApp.onclick = () => openApp(appURL);
        setTimeout(() => openApp(appURL), 250);

        try {
          const response = await fetch(`${API_BASE}/v1/scripts/${encodeURIComponent(route.id)}`);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          const script = payload.script || {};
          el.title.textContent = script.title || '社区作品';
          el.summary.textContent = script.ai_summary || script.summary || '在 Python IDE 中打开这个社区作品。';
          setMeta([
            script.file_type ? `类型 ${script.file_type}` : '',
            script.author_name ? `作者 ${script.author_name}` : '',
            Number.isFinite(script.like_count) ? `点赞 ${script.like_count}` : '',
            Number.isFinite(script.download_count) ? `导入 ${script.download_count}` : '',
          ]);
        } catch (error) {
          el.title.textContent = '打开社区作品';
          el.summary.textContent = '这个链接会在 Python IDE 中打开对应作品。';
          setMeta([route.id]);
          showNotice('暂时无法加载作品预览。你仍然可以尝试用 App 打开。');
          el.raw.textContent = String(error);
          el.raw.classList.remove('hidden');
        }
      }

      function loadImport(route) {
        const appURL = customURLFor(route);
        el.openApp.onclick = () => openApp(appURL);
        el.title.textContent = '导入远程项目';
        el.summary.textContent = route.remote || '缺少远程项目地址。';
        setMeta(['远程导入', route.remote ? hostnameFor(route.remote) : '']);
        showNotice('导入外部项目有风险，请确认来源可信后再在 App 中继续。');
        if (route.remote) {
          setTimeout(() => openApp(appURL), 250);
        } else {
          el.openApp.disabled = true;
        }
      }

      function loadShort(route) {
        el.openApp.onclick = () => openApp(`pythonide://link?code=${encodeURIComponent(route.code)}`);
        el.title.textContent = '分享链接';
        el.summary.textContent = '短链接解析接口接入后，这里会显示项目预览。';
        setMeta([route.code]);
        showNotice('短链接后端还未接入，当前页面用于保留最终 URL 结构。');
      }

      function loadHome() {
        el.openApp.onclick = () => openApp('pythonide://');
        el.title.textContent = 'Python IDE 分享';
        el.summary.textContent = '这里用于打开社区作品、MiniApp 分享和远程导入链接。';
        setMeta(['link.pythonide.xin']);
      }

      const route = parseRoute();
      if (route.type === 'script') {
        loadScript(route);
      } else if (route.type === 'import') {
        loadImport(route);
      } else if (route.type === 'short') {
        loadShort(route);
      } else {
        loadHome();
      }
    </script>
  </body>
</html>
